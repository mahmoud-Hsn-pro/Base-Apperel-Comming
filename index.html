<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base Apparel</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="page">
    <div class="page-content">
      <header class="padding">
        <a href="#">
          <img src="./images/logo.svg" alt="logo" class="logo">
        </a>
      </header>
      <main>
        <div class="hero"></div>
        <div class="padding">
          <h1><span class="colored">we're</span><br>coming<br>soon</h1>
          <p>Hello fellow shoppers! We're currently building our new fashion store. Add your email below to stay
            up-to-date with
            announcements and our launch deals.</p>
          <form>
            <input type="text" name="mail" placeholder="Email Address" class="email">
            <img src="./images/icon-error.svg" alt="error icn" class="error">
            <button type="submit"><img src="./images/icon-arrow.svg" alt="submit icon" class="submit"></button>
          </form>
        </div>
      </main>
    </div>
    <div class="profile"></div>
  </div>
  <script src="./script.js"></script>
</body>

</html>
